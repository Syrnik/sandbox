<div class="content">
    <div class="box contentbox">
        <div class="box">
            <div class="flexbox space-8 middle">
                <div class="wide" style="min-width:0">
                    <div class="flexbox space-8 middle" style="min-width:0">
                        <div style="min-width:0;flex:1">
                            <div id="snippet-name-display" class="bold nowrap" style="overflow:hidden;text-overflow:ellipsis"></div>
                            <p id="snippet-desc-display" class="hint custom-mt-2 nowrap" style="overflow:hidden;text-overflow:ellipsis"></p>
                        </div>
                        <span id="access-icon" class="sandbox-access-icon" title="Личный"><i class="fas fa-lock text-yellow"></i></span>
                    </div>
                </div>
                <div>
                    <div class="wa-select">
                        <select id="environment-select">
                            <option value="">— {_w('Без окружения')|escape} —</option>
                            {foreach $environments as $env}
                            <option value="{$env.id}">{$env.name|escape}</option>
                            {/foreach}
                        </select>
                    </div>
                </div>
                <div>
                    <a href="?module=backend&action=catalog" class="button light-gray">{_w('Каталог сниппетов')|escape}</a>
                    <a href="?module=backend&action=environments" class="button light-gray">{_w('Окружения')|escape}</a>
                </div>
            </div>
        </div>

        <div class="box">
            <div class="flexbox space-8 middle">
                <div>
                    <div class="wa-select">
                        <select id="recent-snippets">
                            <option value="">— {_w('Недавние сниппеты')|escape} —</option>
                            {foreach $recent_snippets as $s}
                            <option value="{$s.id}" class="js-load-snippet">{$s.name|escape}</option>
                            {/foreach}
                        </select>
                    </div>
                </div>
                <div>
                    <label class="inline-block">
                        <span class="wa-checkbox">
                            <input type="checkbox" id="smarty-toggle">
                            <span>
                                <span class="icon">
                                    <i class="fas fa-check"></i>
                                </span>
                            </span>
                        </span>
                        Smarty
                    </label>
                </div>
                <div class="wide"></div>
                <div id="execution-time" class="sandbox-execution-time"></div>
            </div>
        </div>

        <div class="sandbox-editor-layout">
            <div class="sandbox-editors-column">
                <div class="sandbox-editor-box box shadowed">
                    <div class="box small"><strong>PHP</strong></div>
                    <div class="sandbox-editor-container" id="php-editor"></div>
                </div>

                <div id="smarty-editor-wrapper" class="sandbox-editor-box box shadowed" style="display:none">
                    <div class="box small"><strong>Smarty</strong></div>
                    <div class="sandbox-editor-container" id="smarty-editor"></div>
                </div>

                <div class="box sandbox-editor-footer">
                    <button type="button" id="btn-execute" class="button green"><i class="fas fa-play"></i> {_w('Выполнить')|escape}</button>
                    <button type="button" id="btn-save" class="button blue"><i class="fas fa-save"></i> {_w('Сохранить')|escape}</button>
                    <button type="button" id="btn-new" class="button light-gray">{_w('Новый')|escape}</button>
                </div>
            </div>

            <div class="sandbox-result-column">
                <div class="sandbox-result-box box shadowed">
                    <div class="box small flexbox middle space-8">
                        <strong class="wide">{_w('Результат')|escape}</strong>
                        <button type="button" id="btn-clear-result" class="button light-gray small">{_w('Очистить')|escape}</button>
                        <button type="button" id="btn-copy-result" class="button light-gray small">{_w('Копировать')|escape}</button>
                    </div>
                    <div id="result-output" class="sandbox-result-panel"></div>
                    <div id="result-errors" class="sandbox-error" style="display:none"></div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="{$wa_app_static_url}js/vendor/ace/ace.js"></script>
<script>ace.config.set('basePath', '{$wa_app_static_url}js/vendor/ace/');</script>
<script>
{literal}
(($) => {
    "use strict";

    const STORAGE_KEY = "sandbox_editor_state";

    class SandboxEditor {
        currentSnippetId = null;
        currentSnippetName = "";
        currentSnippetDesc = "";
        phpEditor = null;
        smartyEditor = null;
        isShared = 0;

        init() {
            this.initEditors();
            this.bindEvents();
            this.restoreFromLocalStorage();
            this.#initAutoSave();

            const urlParams = new URLSearchParams(location.search);
            const snippetId = urlParams.get('snippet_id');
            if (snippetId) {
                this.loadSnippet(parseInt(snippetId, 10));
            }
        }

        initEditors() {
            this.phpEditor = ace.edit("php-editor");
            this.phpEditor.session.setMode("ace/mode/php");
            this.phpEditor.setOptions({ fontSize: "14px", showPrintMargin: false });

            this.smartyEditor = ace.edit("smarty-editor");
            this.smartyEditor.session.setMode("ace/mode/smarty");
            this.smartyEditor.setOptions({ fontSize: "14px", showPrintMargin: false });

            this.applyWaTheme();
            this.#watchWaTheme();
        }

        applyWaTheme() {
            const isDark = document.documentElement.getAttribute("data-theme") !== "light";
            const theme = isDark ? "monokai" : "eclipse";
            this.phpEditor.setTheme("ace/theme/" + theme);
            this.smartyEditor.setTheme("ace/theme/" + theme);
        }

        bindEvents() {
            $("#btn-execute").on("click", () => this.execute());
            $("#btn-save").on("click", () => this.save());
            $("#btn-new").on("click", () => this.newSnippet());
            $("#btn-copy-result").on("click", () => {
                const text = $("#result-output").text();
                navigator.clipboard.writeText(text).then(() => {
                    const $btn = $("#btn-copy-result");
                    const orig = $btn.text();
                    $btn.text("Скопировано!");
                    setTimeout(() => $btn.text(orig), 1500);
                });
            });

            $("#btn-clear-result").on("click", () => {
                $("#result-output").html("");
                $("#result-errors").hide().html("");
            });

            $("#smarty-toggle").on("change", (e) => {
                const visible = e.target.checked;
                $("#smarty-editor-wrapper").toggle(visible);
                setTimeout(() => {
                    this.phpEditor.resize();
                    if (visible) this.smartyEditor.resize();
                }, 0);
            });

            $("#recent-snippets").on("change", (e) => {
                const id = parseInt($(e.currentTarget).val(), 10);
                if (id) this.loadSnippet(id);
                $(e.currentTarget).val("");
            });
        }

        saveToLocalStorage() {
            try {
                const state = {
                    code_php:       this.phpEditor.getValue(),
                    code_smarty:    this.smartyEditor.getValue(),
                    smarty_visible: $("#smarty-toggle").is(":checked"),
                    environment_id: $("#environment-select").val() ?? "",
                    snippet_id:     this.currentSnippetId,
                    snippet_name:   this.currentSnippetName,
                    snippet_desc:   this.currentSnippetDesc,
                    is_shared:      this.isShared,
                    timestamp:      Date.now(),
                };
                localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
            } catch {
                // localStorage недоступен — молча игнорируем
            }
        }

        restoreFromLocalStorage() {
            const urlParams = new URLSearchParams(location.search);
            if (urlParams.get("snippet_id")) return;

            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) return;

                const state = JSON.parse(raw);

                if (state.code_php)    this.phpEditor.setValue(state.code_php, -1);
                if (state.code_smarty) this.smartyEditor.setValue(state.code_smarty, -1);

                if (state.smarty_visible) {
                    $("#smarty-toggle").prop("checked", true).trigger("change");
                }
                if (state.environment_id) {
                    $("#environment-select").val(state.environment_id);
                }
                if (state.snippet_id) {
                    this.currentSnippetId = state.snippet_id;
                }
                this.#updateMeta(state.snippet_name || "", state.snippet_desc || "", state.is_shared || 0);
            } catch {
                // Повреждённые данные — молча игнорируем
            }
        }

        clearLocalStorage() {
            try { localStorage.removeItem(STORAGE_KEY); } catch {}
        }

        execute() {
            this.saveToLocalStorage();

            const data = {
                code_php:       this.phpEditor.getValue(),
                code_smarty:    this.smartyEditor.getValue(),
                environment_id: $("#environment-select").val(),
            };

            $("#btn-execute").prop("disabled", true).html('<i class="fas fa-spinner wa-animation-spin speed-1000"></i> Выполнить');

            $.ajax({
                url: "?module=backend&action=snippetExecute",
                type: "POST",
                data,
                dataType: "json",
                success: ({ status, data: result }) => {
                    if (status !== "ok") return;
                    $("#result-output").html(result.output || "<em class='hint'>Нет вывода</em>");
                    if (result.error) {
                        $("#result-errors").html(`<pre>${result.error}</pre>`).show();
                    } else {
                        $("#result-errors").hide().html("");
                    }
                    if (result.execution_time) {
                        $("#execution-time").text(`${result.execution_time}s`);
                    }
                },
                complete: () => {
                    $("#btn-execute").prop("disabled", false).html('<i class="fas fa-play"></i> Выполнить');
                },
            });
        }

        save() {
            const hasId = !!this.currentSnippetId;

            const content = `
                <div class="fields vertical">
                    <div class="field">
                        <div class="name">Название <span class="red">*</span></div>
                        <div class="value">
                            <input type="text" id="save-dialog-name" class="full-width">
                        </div>
                    </div>
                    <div class="field">
                        <div class="name">Описание</div>
                        <div class="value">
                            <textarea id="save-dialog-desc" class="full-width" rows="3" style="resize:vertical"></textarea>
                        </div>
                    </div>
                </div>
                <div class="fields custom-mt-12">
                    <div class="field">
                        <div class="name">Доступ для всех</div>
                        <div class="value">
                            <span class="switch" id="save-dialog-shared-switch">
                                <input type="checkbox" id="save-dialog-shared">
                            </span>
                        </div>
                    </div>
                    ${hasId ? `<div class="field">
                        <div class="name">Сохранить как новый</div>
                        <div class="value">
                            <span class="switch" id="save-dialog-as-new-switch">
                                <input type="checkbox" id="save-dialog-as-new">
                            </span>
                        </div>
                    </div>` : ""}
                </div>`;

            const footer = `<button class="button green js-confirm-save">Сохранить</button>
                            <a href="#" class="js-dialog-close">Отмена</a>`;

            $.waDialog({
                header: "Сохранить сниппет",
                content,
                footer,
                onOpen: ($wrapper) => {
                    $wrapper.find("#save-dialog-name").val(this.currentSnippetName);
                    $wrapper.find("#save-dialog-desc").val(this.currentSnippetDesc);
                    $wrapper.find("#save-dialog-shared").prop("checked", !!this.isShared);
                    $wrapper.find("#save-dialog-shared-switch").waSwitch();
                    if (hasId) {
                        $wrapper.find("#save-dialog-as-new-switch").waSwitch();
                    }

                    $wrapper.on("click", ".js-confirm-save", () => {
                        const newName = $wrapper.find("#save-dialog-name").val().trim();
                        if (!newName) {
                            alert("Укажите название сниппета");
                            $wrapper.find("#save-dialog-name").focus();
                            return;
                        }

                        const saveAsNew = hasId && $wrapper.find("#save-dialog-as-new").is(":checked");
                        const newDesc = $wrapper.find("#save-dialog-desc").val();
                        const newShared = $wrapper.find("#save-dialog-shared").is(":checked") ? 1 : 0;

                        const data = {
                            name:        newName,
                            description: newDesc,
                            code_php:    this.phpEditor.getValue(),
                            code_smarty: this.smartyEditor.getValue(),
                            is_shared:   newShared,
                        };
                        if (!saveAsNew && this.currentSnippetId) {
                            data.id = this.currentSnippetId;
                        }

                        $.ajax({
                            url: "?module=backend&action=snippetSave",
                            type: "POST",
                            data,
                            dataType: "json",
                            success: ({ status, data: snippet }) => {
                                if (status !== "ok") return;
                                this.currentSnippetId = snippet.id;
                                this.#updateMeta(newName, newDesc, newShared);
                                this.saveToLocalStorage();
                                $wrapper.trigger("dialog-close");
                            },
                        });
                    });
                },
            });
        }

        loadSnippet(id) {
            $.ajax({
                url: "?module=backend&action=snippet",
                data: { id },
                cache: true,
                dataType: "json",
                success: ({ status, data: s }) => {
                    if (status !== "ok") return;
                    this.phpEditor.setValue(s.code_php ?? "", -1);
                    this.smartyEditor.setValue(s.code_smarty ?? "", -1);
                    this.currentSnippetId = s.id;
                    this.#updateMeta(s.name, s.description ?? "", s.is_shared);
                    this.saveToLocalStorage();
                },
            });
        }

        newSnippet() {
            this.currentSnippetId = null;
            this.phpEditor.setValue("", -1);
            this.smartyEditor.setValue("", -1);
            this.#updateMeta("", "", 0);
            $("#result-output").html("");
            $("#result-errors").hide().html("");
            this.clearLocalStorage();
        }

        #updateMeta(name, desc, isShared) {
            this.currentSnippetName = name;
            this.currentSnippetDesc = desc;
            this.isShared = isShared ? 1 : 0;
            $("#snippet-name-display").text(name);
            $("#snippet-desc-display").text(desc || "");
            this.#updateAccessIcon();
        }

        #updateAccessIcon() {
            const $icon = $("#access-icon");
            $icon.html(this.isShared ? '<i class="fas fa-globe text-blue"></i>' : '<i class="fas fa-lock text-yellow"></i>');
            $icon.attr("title", this.isShared ? "Общий доступ" : "Личный");
        }

        #watchWaTheme() {
            new MutationObserver(() => this.applyWaTheme()).observe(
                document.documentElement,
                { attributes: true, attributeFilter: ["data-theme"] }
            );
        }

        #initAutoSave() {
            let timer = null;
            const debouncedSave = () => {
                clearTimeout(timer);
                timer = setTimeout(() => this.saveToLocalStorage(), 1000);
            };
            this.phpEditor.on("change", debouncedSave);
            this.smartyEditor.on("change", debouncedSave);
        }
    }

    $(() => {
        const editor = new SandboxEditor();
        editor.init();
    });

})(jQuery);
{/literal}
</script>
