<div class="content">
    <div class="box contentbox">
        <div class="box">
            <div class="flexbox middle space-8">
                <h1 class="wide">Окружения</h1>
                <a href="?module=backend" class="button light-gray">&#8592; {_w('Редактор')|escape}</a>
                <a href="?module=backend&action=catalog" class="button light-gray">{_w('Каталог сниппетов')|escape}</a>
            </div>
        </div>
    </div>
</div>

<div class="flexbox">
    <div class="sidebar" style="width:260px;min-width:260px">
        <div class="box">
            <button id="btn-add-env" class="button green small full-width">&#43; Добавить окружение</button>
        </div>
        <ul class="menu" id="env-list">
            {foreach $environments as $env}
            <li>
                <a href="#" class="js-select-env" data-id="{$env.id}">
                    {$env.name|escape}
                    {if $env.is_shared}<span class="hint small">&#127760;</span>{/if}
                </a>
            </li>
            {/foreach}
        </ul>
    </div>

    <div class="content wide" id="env-editor" style="display:none">
        <div class="box">
            <div class="flexbox middle space-8">
                <input type="hidden" id="env-id" value="">
                <input type="text" id="env-name" class="bold wide" placeholder="Название окружения">
                <label class="inline-block">
                    <input type="checkbox" id="env-shared"> Общий доступ
                </label>
            </div>
        </div>

        <div class="box">
            <table class="zebra full-width" id="vars-table">
                <thead>
                    <tr>
                        <th>Переменная</th>
                        <th>Значение</th>
                        <th style="width:40px"></th>
                    </tr>
                </thead>
                <tbody id="vars-body">
                </tbody>
            </table>
            <div class="box">
                <button id="btn-add-var" class="button light-gray small">&#43; Добавить переменную</button>
            </div>
        </div>

        <div class="box">
            <button id="btn-save-env" class="button blue">&#128190; Сохранить</button>
            <button id="btn-delete-env" class="button red">&#128465; Удалить</button>
            <button id="btn-export-env" class="button light-gray">&#8681; Экспорт</button>
        </div>
    </div>

    <div class="content wide" id="env-empty" style="padding:20px">
        <p class="hint">Выберите окружение из списка или создайте новое.</p>
    </div>
</div>

<script>
$(() => {
    new SandboxEnvironments({
        l10n: {
            name_required:  {_w('Укажите название')|json_encode:256},
            confirm_delete: {_w('Удалить окружение?')|json_encode:256},
        },
    }).init();
});
</script>
